name: ClusterFuzzLite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday at 03:00 UTC

permissions: {}

jobs:
  build:
    name: Build fuzz targets
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Build fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c
        with:
          language: javascript
          sanitizer: none

  fuzz-pr:
    name: Fuzz (pull request)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: build
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Build fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c
        with:
          language: javascript
          sanitizer: none

      - name: Run fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c
        with:
          language: javascript
          sanitizer: none
          fuzz-seconds: 300
          mode: code-change
          output-sarif: true

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@c793b717bc78562f491db7b0e93a3a178b099162 # v4
        with:
          sarif_file: cifuzz-sarif/results.sarif

  fuzz-push:
    name: Fuzz (push to main / scheduled)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    needs: build
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Build fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c
        with:
          language: javascript
          sanitizer: none

      - name: Run fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@52ecc61cb587ee99c26825a112a21abf19c7448c
        with:
          language: javascript
          sanitizer: none
          fuzz-seconds: 600
          mode: batch
          output-sarif: true

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@c793b717bc78562f491db7b0e93a3a178b099162 # v4
        with:
          sarif_file: cifuzz-sarif/results.sarif
